<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Register - Sanju Obito Mobile Shope</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #050a14;
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container {
      background: #0d1a2e;
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 500px;
      box-shadow: 0 0 40px rgba(0,229,255,0.1);
    }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem; font-weight:700;
      color: #00e5ff; text-align:center;
      margin-bottom: 6px;
    }
    .logo span { color: #ff6b35; }
    h2 {
      text-align:center; color: #e0f4ff;
      font-size: 1.1rem; font-weight:400;
      margin-bottom: 30px; color: #7ba8c4;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display:block; color: #00e5ff;
      font-size: 0.8rem; font-weight:600;
      letter-spacing: 1px; text-transform:uppercase;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width:100%;
      background: #050a14;
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e0f4ff;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.95rem;
      outline:none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #00e5ff;
    }
    select option { background: #0d1a2e; }
    textarea { resize:vertical; min-height: 80px; }
    .btn {
      width:100%;
      background: #00e5ff; color: #050a14;
      border:none; border-radius:10px;
      padding: 14px;
      font-weight:800; font-size:1rem;
      letter-spacing:1px; cursor:pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn:hover { transform:translateY(-2px); box-shadow: 0 0 24px rgba(0,229,255,0.4); }
    .message {
      text-align:center; padding: 12px;
      border-radius: 10px; margin-top: 16px;
      font-weight:600; display:none;
    }
    .message.success { background: rgba(0,255,100,0.1); border:1px solid rgba(0,255,100,0.3); color: #00ff64; }
    .message.error { background: rgba(255,50,50,0.1); border:1px solid rgba(255,50,50,0.3); color: #ff5050; }
    .admin-link {
      text-align:center; margin-top:20px;
    }
    .admin-link a {
      color: #7ba8c4; font-size:0.85rem; text-decoration:none;
    }
    .admin-link a:hover { color: #00e5ff; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">Natarajan <span>Mobile</span></div>
  <h2>Customer Registration</h2>

  <div class="form-group">
    <label>👤 பெயர் (Name) *</label>
    <input type="text" id="name" placeholder="உங்கள் பெயர்"/>
  </div>

  <div class="form-group">
    <label>📞 Phone Number *</label>
    <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"/>
  </div>

  <div class="form-group">
    <label>📧 Email</label>
    <input type="email" id="email" placeholder="email@example.com"/>
  </div>

  <div class="form-group">
    <label>📍 Address</label>
    <textarea id="address" placeholder="உங்கள் முழு address"></textarea>
  </div>

  <div class="form-group">
    <label>📱 Device Model</label>
    <input type="text" id="device_model" placeholder="உதா: iPhone 14, Samsung S23"/>
  </div>

  <div class="form-group">
    <label>🔧 Service Type</label>
    <select id="service_type">
      <option value="">-- Service தேர்வு --</option>
      <option>Screen Replacement</option>
      <option>Battery Replacement</option>
      <option>Water Damage Repair</option>
      <option>Camera Repair</option>
      <option>Charging Port Fix</option>
      <option>Software Issues</option>
      <option>Buy New Mobile</option>
      <option>Other</option>
    </select>
  </div>

  <button class="btn" onclick="register()">🚀 Register செய்யுங்கள்</button>

  <div class="message" id="message"></div>

  <div class="admin-link">
    <a href="admin.html">🔐 Admin Panel →</a>
  </div>
</div>

<script>
  async function register() {

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const address = document.getElementById('address').value.trim();
  const device_model = document.getElementById('device_model').value.trim();
  const service_type = document.getElementById('service_type').value;

  if (!name || !phone) {
    showMessage('❌ பெயர் மற்றும் Phone number கட்டாயம்!', 'error');
    return;
  }

  try {

    const response = await fetch('https://lieselotte-petiolular-neta.ngrok-free.dev/api/customers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, email, address, device_model, service_type })
    });

    const data = await response.json();

    if (response.ok) {
      showMessage('✅ Customer Saved Successfully!', 'success');
      clearForm();
    } else {
      showMessage('❌ Error saving data', 'error');
    }

  } catch (err) {
    showMessage('❌ Server connect ஆகவில்லை!', 'error');
  }
}

function showMessage(msg, type) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className = 'message ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function clearForm() {
  ['name','phone','email','address','device_model'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('service_type').value = '';
}
</script>
</body>
</html>
